name: Guard strategic files

# CI checkpoint that blocks paths matching the BLOCKED array from being
# tracked by git. Pairs with the project's release sanitization process
# (see docs/release-playbook.md). When triggered, prints a remediation
# message so contributors know what to do next.

on:
  push:
    branches: [main, "codex/**", "pre-release/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    name: Block strategic / weakness-exposing files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need HEAD + parent for "changed files" diff

      - name: Scan for blocked paths
        shell: bash
        run: |
          set -euo pipefail

          # Path patterns that should not appear in the tracked tree.
          BLOCKED=(
            "experiments/competitive_landscape*.md"
            "experiments/beta_recruitment*.md"
            "docs/messaging.md"
            "docs/vision.md"
            "docs/telemetry_roadmap.md"
            "docs/playbook-auto-extraction-design.md"
            "docs/design/"
            "docs/milestone_review_*.md"
            "docs/milestone_review_*.html"
            "docs/coverage_baseline_*.md"
            "experiments/evaluations/v*/cross_ai/"
            "experiments/evaluations/v*/REPORT.md"
            "experiments/evaluations/v*/README.md"
            "experiments/evaluations/v*/evidence_pack.md"
            "experiments/evaluations/v*/run_evaluation.py"
            "experiments/dynamic_loading/HOW_TO_TEST.md"
            "docs/_drafts/"
            "engram-private-strategy/"
          )

          hits=()
          for pat in "${BLOCKED[@]}"; do
            # Use git ls-files to check tracked files only.
            # -z + xargs handles spaces in paths defensively.
            while IFS= read -r f; do
              [ -n "$f" ] && hits+=("$f")
            done < <(git ls-files -- "$pat" 2>/dev/null || true)
          done

          if [ "${#hits[@]}" -eq 0 ]; then
            echo "[ok] no strategic files committed."
            exit 0
          fi

          echo "::error::Found ${#hits[@]} path(s) matching the blocked list:"
          for f in "${hits[@]}"; do
            echo "  - $f"
          done
          echo ""
          echo "See docs/release-playbook.md for the project's release process."
          echo ""
          echo "Fix:"
          echo "  1. Move the file outside the repo (or to a gitignored path)"
          echo "  2. git rm <file>"
          echo "  3. Confirm .gitignore covers the pattern"
          echo "  4. Re-push"
          exit 1
