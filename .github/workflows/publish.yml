name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publishing (OIDC)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pre-release sanitization scan (HIGH-severity blocks publish)
        run: python scripts/release_sanitize_check.py

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC Trusted Publishing — no API token needed.
        # Fallback to token if Trusted Publishing is not yet configured on PyPI.
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
